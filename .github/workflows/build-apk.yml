name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Initialize Bubblewrap
        run: |
          mkdir apk && cd apk
          bubblewrap init --manifest https://rodrigodanielrs-prog.github.io/Agrolyaut-/manifest.json \
            --directory . \
            --packageId br.edu.setrem.agrolayout \
            --name AgroLayout \
            --shortName AgroLayout \
            --themeColor "#3fb950" \
            --backgroundColor "#07090a" \
            --startUrl https://rodrigodanielrs-prog.github.io/Agrolyaut-/ \
            --iconUrl https://rodrigodanielrs-prog.github.io/Agrolyaut-/icon-512-any.png \
            --maskableIconUrl https://rodrigodanielrs-prog.github.io/Agrolyaut-/icon-512-maskable.png \
            --signingKeyPath ./signing.keystore \
            --signingKeyAlias agrolayout \
            --signingKeyPassword agrolayout123 \
            --signingStorePassword agrolayout123

      - name: Generate keystore
        run: |
          cd apk
          keytool -genkey -v \
            -keystore signing.keystore \
            -alias agrolayout \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass agrolayout123 \
            -keypass agrolayout123 \
            -dname "CN=AgroLayout, OU=SETREM, O=SETREM, L=Tres de Maio, ST=RS, C=BR"

      - name: Build APK
        run: |
          cd apk
          bubblewrap build

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: AgroLayout-APK
          path: apk/app-release-signed.apk
          if-no-files-found: warn
