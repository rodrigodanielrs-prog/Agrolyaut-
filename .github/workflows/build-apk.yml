name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK components
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "build-tools;34.0.0" "platforms;android-34" "platform-tools"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Capacitor
        run: |
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Configure Capacitor (local mode - no remote URL)
        run: |
          cat > capacitor.config.json << 'CAPEOF'
          {
            "appId": "br.edu.setrem.agrolayout",
            "appName": "AgroLayout",
            "webDir": "www",
            "android": {
              "backgroundColor": "#07090a",
              "allowMixedContent": true
            },
            "plugins": {
              "SplashScreen": {
                "launchShowDuration": 0
              }
            }
          }
          CAPEOF

      - name: Copy app files to www
        run: |
          mkdir -p www
          cp index.html www/index.html
          cp manifest.json www/manifest.json
          cp sw.js www/sw.js
          cp icon-192-any.png www/ 2>/dev/null || true
          cp icon-512-any.png www/ 2>/dev/null || true
          cp icon-192-maskable.png www/ 2>/dev/null || true
          cp icon-512-maskable.png www/ 2>/dev/null || true

      - name: Add Android platform
        run: npx cap add android

      - name: Add GPS and storage permissions to AndroidManifest
        run: |
          sed -i 's|<uses-permission android:name="android.permission.INTERNET" />|<uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />\n    <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />\n    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />\n    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />|' android/app/src/main/AndroidManifest.xml

      - name: Fix Kotlin duplicate classes
        run: |
          cat >> android/app/build.gradle << 'GRADEOF'

          configurations.all {
              resolutionStrategy {
                  force 'org.jetbrains.kotlin:kotlin-stdlib:1.8.22'
                  force 'org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.8.22'
                  force 'org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.8.22'
              }
          }
          GRADEOF

      - name: Generate keystore
        run: |
          keytool -genkey -v \
            -keystore agrolayout.keystore \
            -alias agrolayout \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass agrolayout123 \
            -keypass agrolayout123 \
            -dname "CN=AgroLayout, OU=SETREM, O=SETREM, L=Tres de Maio, ST=RS, C=BR"

      - name: Configure signing
        run: |
          cat >> android/app/build.gradle << 'GRADEOF'

          android.signingConfigs {
              release {
                  storeFile file("$rootDir/../agrolayout.keystore")
                  storePassword "agrolayout123"
                  keyAlias "agrolayout"
                  keyPassword "agrolayout123"
              }
          }
          android.buildTypes.release.signingConfig = android.signingConfigs.release
          GRADEOF

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AgroLayout-APK
          path: android/app/build/outputs/apk/release/app-release*.apk
          if-no-files-found: error
