name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install build tools
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "build-tools;34.0.0" "platforms;android-34"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Generate keystore
        run: |
          keytool -genkey -v \
            -keystore ${{ github.workspace }}/agrolayout.keystore \
            -alias agrolayout \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass agrolayout123 \
            -keypass agrolayout123 \
            -dname "CN=AgroLayout, OU=SETREM, O=SETREM, L=Tres de Maio, ST=RS, C=BR"

      - name: Build with Bubblewrap (non-interactive)
        run: |
          bubblewrap init \
            --manifest "https://rodrigodanielrs-prog.github.io/Agrolyaut-/manifest.json" \
            --packageId "br.edu.setrem.agrolayout" \
            --name "AgroLayout" \
            --shortName "AgroLayout" \
            --themeColor "#3fb950" \
            --backgroundColor "#07090a" \
            --startUrl "https://rodrigodanielrs-prog.github.io/Agrolyaut-/" \
            --iconUrl "https://rodrigodanielrs-prog.github.io/Agrolyaut-/icon-512-any.png" \
            --maskableIconUrl "https://rodrigodanielrs-prog.github.io/Agrolyaut-/icon-512-maskable.png" \
            --signingKeyPath "${{ github.workspace }}/agrolayout.keystore" \
            --signingKeyAlias "agrolayout" \
            --signingKeyPassword "agrolayout123" \
            --signingStorePassword "agrolayout123" \
            --jdkPath "$JAVA_HOME" \
            --sdkPath "$ANDROID_SDK_ROOT" \
            --skipVersionUpgrade
        env:
          CI: true

      - name: Build APK
        run: |
          bubblewrap build \
            --skipSigning false
        env:
          CI: true

      - name: Find and list APKs
        run: find ${{ github.workspace }} -name "*.apk" -type f

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: AgroLayout-APK
          path: "**/*.apk"
          if-no-files-found: warn
