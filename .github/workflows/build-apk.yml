name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK components
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "build-tools;34.0.0" "platforms;android-34" "platform-tools"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Create Capacitor project
        run: |
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Configure Capacitor
        run: |
          cat > capacitor.config.json << 'CAPEOF'
          {
            "appId": "br.edu.setrem.agrolayout",
            "appName": "AgroLayout",
            "webDir": "www",
            "server": {
              "url": "https://rodrigodanielrs-prog.github.io/Agrolyaut-/",
              "cleartext": false
            },
            "android": {
              "backgroundColor": "#07090a"
            }
          }
          CAPEOF

      - name: Create web directory
        run: |
          mkdir -p www
          cat > www/index.html << 'WEBEOF'
          <!DOCTYPE html>
          <html>
          <head>
            <meta http-equiv="refresh" content="0; url=https://rodrigodanielrs-prog.github.io/Agrolyaut-/">
          </head>
          <body>Carregando AgroLayout...</body>
          </html>
          WEBEOF

      - name: Add Android platform
        run: npx cap add android

      - name: Generate keystore
        run: |
          keytool -genkey -v \
            -keystore agrolayout.keystore \
            -alias agrolayout \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass agrolayout123 \
            -keypass agrolayout123 \
            -dname "CN=AgroLayout, OU=SETREM, O=SETREM, L=Tres de Maio, ST=RS, C=BR"

      - name: Configure signing
        run: |
          cat >> android/app/build.gradle << 'GRADEOF'

          android {
              signingConfigs {
                  release {
                      storeFile file("$rootDir/../agrolayout.keystore")
                      storePassword "agrolayout123"
                      keyAlias "agrolayout"
                      keyPassword "agrolayout123"
                  }
              }
              buildTypes {
                  release {
                      signingConfig signingConfigs.release
                  }
              }
          }
          GRADEOF

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Find APK
        run: find . -name "*.apk" -type f

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AgroLayout-APK
          path: android/app/build/outputs/apk/release/app-release*.apk
          if-no-files-found: error
