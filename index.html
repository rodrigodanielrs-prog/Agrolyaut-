/* required styles */

.leaflet-pane,
.leaflet-tile,
.leaflet-marker-icon,
.leaflet-marker-shadow,
.leaflet-tile-container,
.leaflet-pane > svg,
.leaflet-pane > canvas,
.leaflet-zoom-box,
.leaflet-image-layer,
.leaflet-layer {
	position: absolute;
	left: 0;
	top: 0;
	}
.leaflet-container {
	overflow: hidden;
	}
.leaflet-tile,
.leaflet-marker-icon,
.leaflet-marker-shadow {
	-webkit-user-select: none;
	   -moz-user-select: none;
	        user-select: none;
	  -webkit-user-drag: none;
	}
/* Prevents IE11 from highlighting tiles in blue */
.leaflet-tile::selection {
	background: transparent;
}
/* Safari renders non-retina tile on retina better with this, but Chrome is worse */
.leaflet-safari .leaflet-tile {
	image-rendering: -webkit-optimize-contrast;
	}
/* hack that prevents hw layers "stretching" when loading new tiles */
.leaflet-safari .leaflet-tile-container {
	width: 1600px;
	height: 1600px;
	-webkit-transform-origin: 0 0;
	}
.leaflet-marker-icon,
.leaflet-marker-shadow {
	display: block;
	}
/* .leaflet-container svg: reset svg max-width decleration shipped in Joomla! (joomla.org) 3.x */
/* .leaflet-container img: map is broken in FF if you have max-width: 100% on tiles */
.leaflet-container .leaflet-overlay-pane svg {
	max-width: none !important;
	max-height: none !important;
	}
.leaflet-container .leaflet-marker-pane img,
.leaflet-container .leaflet-shadow-pane img,
.leaflet-container .leaflet-tile-pane img,
.leaflet-container img.leaflet-image-layer,
.leaflet-container .leaflet-tile {
	max-width: none !important;
	max-height: none !important;
	width: auto;
	padding: 0;
	}

.leaflet-container img.leaflet-tile {
	/* See: https://bugs.chromium.org/p/chromium/issues/detail?id=600120 */
	mix-blend-mode: plus-lighter;
}

.leaflet-container.leaflet-touch-zoom {
	-ms-touch-action: pan-x pan-y;
	touch-action: pan-x pan-y;
	}
.leaflet-container.leaflet-touch-drag {
	-ms-touch-action: pinch-zoom;
	/* Fallback for FF which doesn't support pinch-zoom */
	touch-action: none;
	touch-action: pinch-zoom;
}
.leaflet-container.leaflet-touch-drag.leaflet-touch-zoom {
	-ms-touch-action: none;
	touch-action: none;
}
.leaflet-container {
	-webkit-tap-highlight-color: transparent;
}
.leaflet-container a {
	-webkit-tap-highlight-color: rgba(51, 181, 229, 0.4);
}
.leaflet-tile {
	filter: inherit;
	visibility: hidden;
	}
.leaflet-tile-loaded {
	visibility: inherit;
	}
.leaflet-zoom-box {
	width: 0;
	height: 0;
	-moz-box-sizing: border-box;
	     box-sizing: border-box;
	z-index: 800;
	}
/* workaround for https://bugzilla.mozilla.org/show_bug.cgi?id=888319 */
.leaflet-overlay-pane svg {
	-moz-user-select: none;
	}

.leaflet-pane         { z-index: 400; }

.leaflet-tile-pane    { z-index: 200; }
.leaflet-overlay-pane { z-index: 400; }
.leaflet-shadow-pane  { z-index: 500; }
.leaflet-marker-pane  { z-index: 600; }
.leaflet-tooltip-pane   { z-index: 650; }
.leaflet-popup-pane   { z-index: 700; }

.leaflet-map-pane canvas { z-index: 100; }
.leaflet-map-pane svg    { z-index: 200; }

.leaflet-vml-shape {
	width: 1px;
	height: 1px;
	}
.lvml {
	behavior: url(#default#VML);
	display: inline-block;
	position: absolute;
	}


/* control positioning */

.leaflet-control {
	position: relative;
	z-index: 800;
	pointer-events: visiblePainted; /* IE 9-10 doesn't have auto */
	pointer-events: auto;
	}
.leaflet-top,
.leaflet-bottom {
	position: absolute;
	z-index: 1000;
	pointer-events: none;
	}
.leaflet-top {
	top: 0;
	}
.leaflet-right {
	right: 0;
	}
.leaflet-bottom {
	bottom: 0;
	}
.leaflet-left {
	left: 0;
	}
.leaflet-control {
	float: left;
	clear: both;
	}
.leaflet-right .leaflet-control {
	float: right;
	}
.leaflet-top .leaflet-control {
	margin-top: 10px;
	}
.leaflet-bottom .leaflet-control {
	margin-bottom: 10px;
	}
.leaflet-left .leaflet-control {
	margin-left: 10px;
	}
.leaflet-right .leaflet-control {
	margin-right: 10px;
	}


/* zoom and fade animations */

.leaflet-fade-anim .leaflet-popup {
	opacity: 0;
	-webkit-transition: opacity 0.2s linear;
	   -moz-transition: opacity 0.2s linear;
	        transition: opacity 0.2s linear;
	}
.leaflet-fade-anim .leaflet-map-pane .leaflet-popup {
	opacity: 1;
	}
.leaflet-zoom-animated {
	-webkit-transform-origin: 0 0;
	    -ms-transform-origin: 0 0;
	        transform-origin: 0 0;
	}
svg.leaflet-zoom-animated {
	will-change: transform;
}

.leaflet-zoom-anim .leaflet-zoom-animated {
	-webkit-transition: -webkit-transform 0.25s cubic-bezier(0,0,0.25,1);
	   -moz-transition:    -moz-transform 0.25s cubic-bezier(0,0,0.25,1);
	        transition:         transform 0.25s cubic-bezier(0,0,0.25,1);
	}
.leaflet-zoom-anim .leaflet-tile,
.leaflet-pan-anim .leaflet-tile {
	-webkit-transition: none;
	   -moz-transition: none;
	        transition: none;
	}

.leaflet-zoom-anim .leaflet-zoom-hide {
	visibility: hidden;
	}


/* cursors */

.leaflet-interactive {
	cursor: pointer;
	}
.leaflet-grab {
	cursor: -webkit-grab;
	cursor:    -moz-grab;
	cursor:         grab;
	}
.leaflet-crosshair,
.leaflet-crosshair .leaflet-interactive {
	cursor: crosshair;
	}
.leaflet-popup-pane,
.leaflet-control {
	cursor: auto;
	}
.leaflet-dragging .leaflet-grab,
.leaflet-dragging .leaflet-grab .leaflet-interactive,
.leaflet-dragging .leaflet-marker-draggable {
	cursor: move;
	cursor: -webkit-grabbing;
	cursor:    -moz-grabbing;
	cursor:         grabbing;
	}

/* marker & overlays interactivity */
.leaflet-marker-icon,
.leaflet-marker-shadow,
.leaflet-image-layer,
.leaflet-pane > svg path,
.leaflet-tile-container {
	pointer-events: none;
	}

.leaflet-marker-icon.leaflet-interactive,
.leaflet-image-layer.leaflet-interactive,
.leaflet-pane > svg path.leaflet-interactive,
svg.leaflet-image-layer.leaflet-interactive path {
	pointer-events: visiblePainted; /* IE 9-10 doesn't have auto */
	pointer-events: auto;
	}

/* visual tweaks */

.leaflet-container {
	background: #ddd;
	outline-offset: 1px;
	}
.leaflet-container a {
	color: #0078A8;
	}
.leaflet-zoom-box {
	border: 2px dotted #38f;
	background: rgba(255,255,255,0.5);
	}


/* general typography */
.leaflet-container {
	font-family: "Helvetica Neue", Arial, Helvetica, sans-serif;
	font-size: 12px;
	font-size: 0.75rem;
	line-height: 1.5;
	}


/* general toolbar styles */

.leaflet-bar {
	box-shadow: 0 1px 5px rgba(0,0,0,0.65);
	border-radius: 4px;
	}
.leaflet-bar a {
	background-color: #fff;
	border-bottom: 1px solid #ccc;
	width: 26px;
	height: 26px;
	line-height: 26px;
	display: block;
	text-align: center;
	text-decoration: none;
	color: black;
	}
.leaflet-bar a,
.leaflet-control-layers-toggle {
	background-position: 50% 50%;
	background-repeat: no-repeat;
	display: block;
	}
.leaflet-bar a:hover,
.leaflet-bar a:focus {
	background-color: #f4f4f4;
	}
.leaflet-bar a:first-child {
	border-top-left-radius: 4px;
	border-top-right-radius: 4px;
	}
.leaflet-bar a:last-child {
	border-bottom-left-radius: 4px;
	border-bottom-right-radius: 4px;
	border-bottom: none;
	}
.leaflet-bar a.leaflet-disabled {
	cursor: default;
	background-color: #f4f4f4;
	color: #bbb;
	}

.leaflet-touch .leaflet-bar a {
	width: 30px;
	height: 30px;
	line-height: 30px;
	}
.leaflet-touch .leaflet-bar a:first-child {
	border-top-left-radius: 2px;
	border-top-right-radius: 2px;
	}
.leaflet-touch .leaflet-bar a:last-child {
	border-bottom-left-radius: 2px;
	border-bottom-right-radius: 2px;
	}

.leaflet-control-zoom-out {

	text-indent: 1px;

	}
.leaflet-control-attribution,

	}
.leaflet-control-attribution a {

	}
.leaflet-control-attribution a:hover,

	}

.leaflet-popup {

	text-align: center;

	height: 17px;

/* Directions */

.leaflet-tooltip-bottom {
	margin-top: 6px;
}
.leaflet-tooltip-top {
	margin-top: -6px;
}
.leaflet-tooltip-bottom:before,
.leaflet-tooltip-top:before {

	}

	}

	top: 0;

	}
.leaflet-tooltip-left {
	margin-left: -6px;
}
.leaflet-tooltip-right {
	margin-left: 6px;
}
.leaflet-tooltip-left:before,
.leaflet-tooltip-right:before {

	}
.leaflet-tooltip-left:before {

.leaflet-tooltip-right:before {

:root{--bg:#07090a;--surf:#0d1117;--card:#121920;--bord:#1e2d3d;--grn:#3fb950;--yel:#e3b341;--red:#f85149;--txt:#cdd9e5;--mut:#5c7a8a;--fh:'Syne',sans-serif;--fm:'Space Mono',monospace}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--txt);font-family:var(--fm);font-size:12px;display:flex;flex-direction:column}
header{height:48px;background:var(--surf);border-bottom:1px solid var(--bord);display:flex;align-items:center;gap:8px;padding:0 14px;flex-shrink:0}
.logo{font-family:var(--fh);font-weight:800;font-size:17px;color:var(--grn)}.logo span{color:var(--yel)}
.badge{font-family:var(--fh);font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--mut);padding:3px 8px;border:1px solid var(--bord);border-radius:20px}.badge b{color:var(--txt)}
.spacer{flex:1}
.btn{font-family:var(--fm);font-size:11px;padding:5px 11px;border-radius:4px;cursor:pointer;border:none;display:inline-flex;align-items:center;gap:4px;transition:opacity .15s}.btn:hover{opacity:.85}
.btn-grn{background:var(--grn);color:#07090a;font-weight:700}
.btn-yel{background:var(--yel);color:#07090a;font-weight:700}
.btn-ghost{background:transparent;color:var(--mut);border:1px solid var(--bord)}.btn-ghost:hover{color:var(--txt);border-color:var(--mut)}
.layout{display:flex;flex:1;overflow:hidden}
/* SIDEBAR */
.side{width:310px;flex-shrink:0;background:var(--surf);border-right:1px solid var(--bord);display:flex;flex-direction:column;overflow:hidden}
.side-top{flex-shrink:0}
.side-body{flex:1;overflow-y:auto}.side-body::-webkit-scrollbar{width:3px}.side-body::-webkit-scrollbar-thumb{background:var(--bord)}
.section{padding:10px 13px;border-bottom:1px solid var(--bord)}
.sec-title{font-family:var(--fh);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.4px;color:var(--mut);margin-bottom:8px}
/* EXP LIST */
.exp-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:5px;margin-bottom:3px;background:var(--card);border:1px solid var(--bord);cursor:pointer;transition:all .1s}
.exp-item:hover{border-color:var(--mut)}
.exp-active{border-color:var(--grn)!important}
.exp-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.exp-info{flex:1;min-width:0}
.exp-name{font-family:var(--fh);font-size:12px;font-weight:700;color:var(--txt)}
.exp-meta{font-size:10px;color:var(--mut);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.exp-del{background:none;border:none;color:var(--mut);cursor:pointer;font-size:12px;padding:0 2px;flex-shrink:0}.exp-del:hover{color:var(--red)}
.el-empty{color:var(--mut);font-size:11px;text-align:center;padding:10px 0}
/* PANEL */
.p-section{padding:10px 13px;border-bottom:1px solid var(--bord)}
.p-title{font-family:var(--fh);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;margin-bottom:8px;color:var(--grn)}
.lbl{display:block;font-size:10px;color:var(--mut);margin-bottom:3px;margin-top:7px}.lbl:first-child{margin-top:0}
.p-inp{width:100%;background:var(--card);border:1px solid var(--bord);color:var(--txt);font-family:var(--fm);font-size:11px;padding:5px 8px;border-radius:4px;outline:none}
.p-inp:focus{border-color:var(--grn)}
.p-inp:disabled{opacity:.4}
.p-grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.p-info{background:var(--card);border:1px solid var(--bord);border-radius:4px;padding:7px 9px;font-size:11px;color:var(--mut);margin-top:8px;line-height:1.7}
.p-info b{color:var(--txt)}
/* TRAT GRID */
.trat-grid{display:flex;flex-direction:column;gap:3px}
.trat-row{display:flex;align-items:center;gap:5px}
.trat-num{font-size:10px;color:var(--mut);width:18px;text-align:right;flex-shrink:0}
.trat-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}
.trat-inp{flex:1;background:var(--card);border:1px solid var(--bord);color:var(--txt);font-family:var(--fm);font-size:10px;padding:3px 6px;border-radius:3px;outline:none}
.trat-inp:focus{border-color:var(--grn)}
/* MAP */
.map-wrap{flex:1;position:relative;overflow:hidden}
#map{width:100%;height:100%}
/* STATUS */
.statusbar{height:26px;background:var(--surf);border-top:1px solid var(--bord);display:flex;align-items:center;gap:10px;padding:0 13px;font-size:10px;color:var(--mut);flex-shrink:0}
#s-dot{width:6px;height:6px;border-radius:50%;background:var(--mut);flex-shrink:0}
#s-dot.on{background:var(--grn);box-shadow:0 0 5px var(--grn)}
#s-msg{flex:1}
/* TOAST */
#toast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%) translateY(8px);background:var(--grn);color:#07090a;font-family:var(--fh);font-weight:700;font-size:12px;padding:7px 16px;border-radius:5px;z-index:9999;opacity:0;pointer-events:none;transition:all .22s}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.ty{background:var(--yel)}#toast.tr{background:var(--red);color:#fff}
/* PRINT */
@media print{header,.side,.statusbar{display:none!important}.layout{display:block}.map-wrap,#map{width:100%;height:100vh}}
.leaflet-tooltip{background:rgba(7,9,10,.9)!important;border:1px solid rgba(255,255,255,.15)!important;color:#fff!important;font-size:10px!important;padding:2px 6px!important;box-shadow:none!important}


/* ── TOUCH / MOBILE ────────────────────────────────────── */
@media (max-width: 768px) {
  header { height: auto; flex-wrap: wrap; padding: 8px 10px; gap: 6px; }
  .logo { font-size: 15px; }
  .badge { display: none; }
  .side { width: 100%; max-height: 45vh; border-right: none; border-bottom: 1px solid var(--bord); }
  .layout { flex-direction: column; }
  .map-wrap { flex: 1; min-height: 55vh; }
  .btn { font-size: 10px; padding: 5px 8px; }
  .p-grid2 { grid-template-columns: 1fr 1fr; }
  .p-inp { font-size: 13px; padding: 7px 8px; }  /* larger touch targets */
  .trat-inp { font-size: 13px; padding: 5px 7px; }
  input[type=range] { height: 28px; }
  .exp-item { padding: 9px 10px; }
}
@media (max-width: 480px) {
  .btn { font-size: 9px; padding: 4px 6px; }
  header { gap: 4px; }
}

</style>

:function(){var t=this._map;t&&(t.getContainer().focus(),this._deletableLayers.eachLayer(this._enableLayerDelete,this),this._deletedLayers=new L.LayerGroup,this._tooltip=new L.Draw.Tooltip(this._map),this._tooltip.updateContent({text:L.drawLocal.edit.handlers.remove.tooltip.text}),this._map.on("mousemove",this._onMouseMove,this))},removeHooks:function(){this._map&&(this._deletableLayers.eachLayer(this._disableLayerDelete,this),this._deletedLayers=null,this._tooltip.dispose(),this._tooltip=null,this._map.off("mousemove",this._onMouseMove,this))},revertLayers:function(){this._deletedLayers.eachLayer(function(t){this._deletableLayers.addLayer(t),t.fire("revert-deleted",{layer:t})},this)},save:function(){this._map.fire(L.Draw.Event.DELETED,{layers:this._deletedLayers})},removeAllLayers:function(){this._deletableLayers.eachLayer(function(t){this._removeLayer({layer:t})},this),this.save()},_enableLayerDelete:function(t){(t.layer||t.target||t).on("click",this._removeLayer,this)},_disableLayerDelete:function(t){var e=t.layer||t.target||t;e.off("click",this._removeLayer,this),this._deletedLayers.removeLayer(e)},_removeLayer:function(t){var e=t.layer||t.target||t;this._deletableLayers.removeLayer(e),this._deletedLayers.addLayer(e),e.fire("deleted")},_onMouseMove:function(t){this._tooltip.updatePosition(t.latlng)},_hasAvailableLayers:function(){return 0!==this._deletableLayers.getLayers().length}})}(window,document);</script>
<script>
/* ═══════════════════════════════════════════════════════════
   AgroLayout — Multi-Experimento v2
   ═══════════════════════════════════════════════════════════ */

var MLAT = 111320;
function mPerLng(lat){ return 111320 * Math.cos(lat * Math.PI / 180); }

function offsetM(lat, lng, dxM, dyM, deg) {
  var r   = deg * Math.PI / 180;
  var rxM =  dxM * Math.cos(r) + dyM * Math.sin(r);
  var ryM = -dxM * Math.sin(r) + dyM * Math.cos(r);
  return L.latLng(lat + ryM/MLAT, lng + rxM/mPerLng(lat));
}
function makeCorners(lat,lng,x0,y0,w,h,deg){
  return [
    offsetM(lat,lng,x0,  y0,  deg),
    offsetM(lat,lng,x0+w,y0,  deg),
    offsetM(lat,lng,x0+w,y0+h,deg),
    offsetM(lat,lng,x0,  y0+h,deg)
  ];
}
function shuffle(arr){
  var a=arr.slice();
  for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}
  return a;
}

var PAL = [
  '#3fb950','#64b5f6','#ffb74d','#f06292','#ba68c8',
  '#4dd0e1','#fff176','#ff8a65','#a5d6a7','#90caf9',
  '#ce93d8','#80cbc4','#ffcc02','#ef9a9a','#b0bec5','#ffe082'
];
var EXP_COLORS = ['#e3b341','#f85149','#79c0ff','#56d364','#d2a8ff','#ffa657','#ff7b72','#58a6ff'];

var _map, _areaLayers=[], _experiments=[], _nextId=1, _activeExp=null;

/* ── EXPERIMENT FACTORY ──────────────────────────────────── */
function createExp(lat,lng){
  var id=_nextId++, color=EXP_COLORS[(id-1)%EXP_COLORS.length];
  return {
    id:id, name:'Exp '+id, color:color,
    lat:lat, lng:lng, angle:0,
    delin:'DBC',
    nTrat:8, nBlocos:4,
    pLarg:0.85, pComp:5.0,
    espTrat:0.0,   // between plots within block (across-treatment direction)
    espLinhas:0.0, // between plots within block (along-plot direction) — rarely used but available
    espBlocos:1.0, // between blocks
    tratNames:Array.from({length:16},function(_,i){return 'T'+(i+1);}),
    layers:[], marker:null, allocs:null, visible:true
  };
}

function randomizeExp(exp){
  exp.allocs=[];
  var nB=exp.delin==='NONE'?1:exp.nBlocos;
  for(var b=0;b<nB;b++)
    exp.allocs.push(shuffle(Array.from({length:exp.nTrat},function(_,i){return i;})));
}

/* ── MAP INIT ────────────────────────────────────────────── */
function init(){
  _map=L.map('map',{zoomControl:true}).setView([-27.7745,-54.3620],18);
  var tSat=L.tileLayer('https://mt{s}.google.com/vt/lyrs=s&x={x}&y={y}&z={z}',{attribution:'© Google',maxZoom:21,subdomains:'0123'});
  var tHyb=L.tileLayer('https://mt{s}.google.com/vt/lyrs=y&x={x}&y={y}&z={z}',{attribution:'© Google',maxZoom:21,subdomains:'0123'});
  var tOSM=L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OSM',maxZoom:19,subdomains:'abc'});
  tSat.addTo(_map);
  L.control.layers({'🛰 Satélite':tSat,'🛰 Híbrido':tHyb,'🗺 OSM':tOSM},{},{position:'topright',collapsed:false}).addTo(_map);
  L.control.scale({imperial:false,position:'bottomright'}).addTo(_map);
  _map.on('mousemove',function(e){
    document.getElementById('s-coord').textContent=e.latlng.lat.toFixed(6)+', '+e.latlng.lng.toFixed(6);
  });
  setSt('Carregue o GeoJSON da Etapa 1 ou adicione experimentos',false);
}

/* ── ADD / SELECT / DELETE ───────────────────────────────── */
function doAddExp(){
  var c=_map.getCenter();
  var exp=createExp(c.lat,c.lng);
  _experiments.push(exp);
  _activeExp=exp.id;
  randomizeExp(exp);
  addMarker(exp);
  drawExp(exp);
  renderList();
  renderPanel();
  showToast('✓ '+exp.name+' adicionado','');
  setSt(exp.name+' — arraste o marcador colorido para posicionar',true);
}

function selectExp(id){
  _activeExp=id;
  renderList();
  renderPanel();
  var exp=getExp(id);
  if(exp) _map.panTo([exp.lat,exp.lng]);
}

function doDeleteExp(id){
  var exp=getExp(id);
  if(!exp) return;
  exp.layers.forEach(function(l){_map.removeLayer(l);});
  if(exp.marker) _map.removeLayer(exp.marker);
  _experiments=_experiments.filter(function(e){return e.id!==id;});
  if(_activeExp===id) _activeExp=_experiments.length?_experiments[_experiments.length-1].id:null;
  renderList();
  renderPanel();
  showToast('Experimento removido','ty');
}

function doRandomize(){
  var exp=getExp(_activeExp); if(!exp) return;
  randomizeExp(exp); drawExp(exp);
  showToast('✓ Nova aleatorização','');
}

function getExp(id){ return _experiments.find(function(e){return e.id===id;})||null; }

/* ── ANCHOR MARKER ───────────────────────────────────────── */
function addMarker(exp){
  if(exp.marker) _map.removeLayer(exp.marker);
  exp.marker=L.marker([exp.lat,exp.lng],{
    draggable:true, zIndexOffset:1000,
    icon:L.divIcon({
      html:'<div style="width:22px;height:22px;background:'+exp.color+';border:2px solid #fff;border-radius:50%;box-shadow:0 0 8px '+exp.color+'99;cursor:move;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#000">'+exp.id+'</div>',
      iconSize:[22,22],iconAnchor:[11,11],className:''
    })
  }).addTo(_map);
  exp.marker.bindTooltip(exp.name+' — arraste para mover',{direction:'top'});
  exp.marker.on('drag',function(e){exp.lat=e.latlng.lat;exp.lng=e.latlng.lng;drawExp(exp);});
  exp.marker.on('click',function(){selectExp(exp.id);});
}

/* ── DRAW ────────────────────────────────────────────────── */
function drawExp(exp){
  exp.layers.forEach(function(l){_map.removeLayer(l);});
  exp.layers=[];
  if(!exp.visible) return;
  var lat=exp.lat,lng=exp.lng,deg=exp.angle;
  var pw=exp.pLarg, ph=exp.pComp;
  var et=exp.espTrat, eb=exp.espBlocos;
  var nB=exp.delin==='NONE'?1:exp.nBlocos;
  var gj=[];

  // Total width of one block = nTrat*pw + (nTrat-1)*et
  var blockW = exp.nTrat*pw + (exp.nTrat-1)*et;

  for(var b=0;b<nB;b++){
    var y0=b*(ph+eb);

    // Block outline
    var bc=makeCorners(lat,lng,0,y0,blockW,ph,deg);
    var bpoly=L.polygon(bc,{color:exp.color,weight:2,dashArray:'7,4',fill:false,opacity:0.8}).addTo(_map);
    exp.layers.push(bpoly);

    // Block label
    if(exp.delin!=='NONE'){
      var bctr=offsetM(lat,lng,blockW/2,y0+ph/2,deg);
      exp.layers.push(L.marker(bctr,{icon:L.divIcon({
        html:'<div style="background:rgba(0,0,0,.75);color:'+exp.color+';font-family:monospace;font-size:9px;padding:1px 5px;border-radius:3px;white-space:nowrap">B'+(b+1)+'</div>',
        iconSize:[0,0],iconAnchor:[-2,8],className:''
      })}).addTo(_map));
    }

    // Exp name label on first block
    if(b===0){
      var nlat=offsetM(lat,lng,blockW/2,-8,deg);
      exp.layers.push(L.marker(nlat,{icon:L.divIcon({
        html:'<div style="background:rgba(0,0,0,.85);color:'+exp.color+';font-family:monospace;font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;border:1px solid '+exp.color+';white-space:nowrap">'+exp.name+'</div>',
        iconSize:[0,0],iconAnchor:[0,0],className:''
      })}).addTo(_map));
    }

    for(var t=0;t<exp.nTrat;t++){
      var tIdx=exp.allocs[b][t];
      var color=PAL[tIdx%PAL.length];
      var name=exp.tratNames[tIdx]||('T'+(tIdx+1));
      var x0=t*(pw+et);
      var corners=makeCorners(lat,lng,x0,y0,pw,ph,deg);
      var poly=L.polygon(corners,{color:'#00000066',weight:0.8,fillColor:color,fillOpacity:0.6}).addTo(_map);
      poly.bindTooltip('<b style="color:'+color+'">'+name+'</b><br>'+exp.name+(exp.delin!=='NONE'?' · Bloco '+(b+1):''),{direction:'top',sticky:true});
      exp.layers.push(poly);
      var ctr=offsetM(lat,lng,x0+pw/2,y0+ph/2,deg);
      exp.layers.push(L.marker(ctr,{icon:L.divIcon({
        html:'<div style="background:rgba(0,0,0,.75);color:#fff;font-family:monospace;font-size:8px;padding:1px 3px;border-radius:2px;white-space:nowrap;max-width:55px;overflow:hidden;text-overflow:ellipsis">'+name+'</div>',
        iconSize:[0,0],iconAnchor:[0,0],className:''
      })}).addTo(_map));
      gj.push({type:'Feature',
        properties:{exp:exp.id,exp_nome:exp.name,bloco:b+1,trat_idx:tIdx+1,trat_nome:name},
        geometry:{type:'Polygon',coordinates:[corners.map(function(p){return[p.lng,p.lat];}).concat([[corners[0].lng,corners[0].lat]])]}
      });
    }
  }
  exp._gj=gj;

  // Calc dimensions for status
  var totalW=(blockW).toFixed(2);
  var totalH=(nB*ph+(nB-1)*eb).toFixed(1);
  exp._dims=totalW+'×'+totalH+' m ('+(exp.nTrat*nB)+' parc)';
}

/* ── SIDEBAR LIST ────────────────────────────────────────── */
function renderList(){
  var el=document.getElementById('exp-list');
  if(!_experiments.length){el.innerHTML='<div class="el-empty">Nenhum experimento ainda</div>';return;}
  el.innerHTML=_experiments.map(function(exp){
    var act=exp.id===_activeExp;
    return '<div class="exp-item'+(act?' exp-active':'')+'" onclick="selectExp('+exp.id+')" style="'+(act?'border-color:'+exp.color+';background:'+exp.color+'11':'')+'">'
      +'<div class="exp-dot" style="background:'+exp.color+'"></div>'
      +'<div class="exp-info"><div class="exp-name">'+exp.name+'</div>'
      +'<div class="exp-meta">'+(exp.delin==='NONE'?'Sem delin.':exp.delin+' '+exp.nBlocos+'bl')
      +' · '+exp.nTrat+' trat'+(exp._dims?' · '+exp._dims:'')+'</div></div>'
      +'<button class="exp-del" onclick="event.stopPropagation();doDeleteExp('+exp.id+')" title="Remover">✕</button>'
      +'</div>';
  }).join('');
}

/* ── ACTIVE EXPERIMENT PANEL ─────────────────────────────── */
function renderPanel(){
  var exp=getExp(_activeExp);
  var panel=document.getElementById('exp-panel');
  if(!exp){
    panel.innerHTML='<div style="color:var(--mut);font-size:11px;text-align:center;padding:20px">Selecione ou adicione um experimento</div>';
    return;
  }
  var nB=exp.delin==='NONE'?1:exp.nBlocos;
  var blockW=(exp.nTrat*exp.pLarg+(exp.nTrat-1)*exp.espTrat).toFixed(2);
  var totalH=(nB*exp.pComp+(nB-1)*exp.espBlocos).toFixed(1);
  var area=(blockW*totalH/10000).toFixed(4);

  // Build treatment name inputs (only nTrat)
  var tratHtml='';
  for(var i=0;i<exp.nTrat;i++){
    tratHtml+='<div class="trat-row">'
      +'<span class="trat-num">'+(i+1)+'</span>'
      +'<span class="trat-dot" style="background:'+PAL[i%PAL.length]+'"></span>'
      +'<input class="trat-inp" type="text" value="'+(exp.tratNames[i]||'T'+(i+1))+'" data-ei="'+exp.id+'" data-ti="'+i+'" '
      +'oninput="onTratName(this)">'
      +'</div>';
  }

  panel.innerHTML=
    '<div class="p-section">'
      +'<div class="p-title" style="color:'+exp.color+'">'+exp.name+'</div>'
      +'<div style="display:flex;gap:6px;margin-bottom:8px">'
        +'<input type="text" value="'+exp.name+'" style="flex:1;background:var(--card);border:1px solid var(--bord);color:var(--txt);font-family:var(--fm);font-size:11px;padding:5px 8px;border-radius:4px;outline:none" oninput="onExpName(this,'+exp.id+')" placeholder="Nome">'
        +'<button class="btn btn-ghost" onclick="doRandomize()" style="padding:5px 9px" title="Nova aleatorização">🔀</button>'
        +'<button class="btn" style="padding:5px 9px;background:'+exp.color+'22;color:'+exp.color+';border:1px solid '+exp.color+'44" onclick="toggleVis('+exp.id+')" title="Mostrar/ocultar">👁</button>'
      +'</div>'
      // Delineamento
      +'<label class="lbl">Delineamento</label>'
      +'<select onchange="onField(this,\'delin\','+exp.id+')" style="width:100%;background:var(--card);border:1px solid var(--bord);color:var(--txt);font-family:var(--fm);font-size:11px;padding:5px 8px;border-radius:4px;outline:none;margin-bottom:6px">'
        +'<option value="DBC"'+(exp.delin==='DBC'?' selected':'')+'>DBC – Blocos Casualizados</option>'
        +'<option value="DIC"'+(exp.delin==='DIC'?' selected':'')+'>DIC – Inteiramente Casualizado</option>'
        +'<option value="NONE"'+(exp.delin==='NONE'?' selected':'')+'>Sem delineamento (grade simples)</option>'
      +'</select>'
      // Grid de parâmetros
      +'<div class="p-grid2">'
        +'<div><label class="lbl">Nº tratamentos</label><input type="number" value="'+exp.nTrat+'" min="1" max="30" onchange="onFieldN(this,\'nTrat\','+exp.id+')" class="p-inp"></div>'
        +'<div><label class="lbl">Nº blocos</label><input type="number" value="'+exp.nBlocos+'" min="1" max="12" onchange="onFieldN(this,\'nBlocos\','+exp.id+')" class="p-inp" '+(exp.delin==='NONE'?'disabled':'')+' ></div>'
      +'</div>'
      +'<div class="p-grid2">'
        +'<div><label class="lbl">Larg. parcela (m)</label><input type="number" value="'+exp.pLarg+'" min="0.1" step="0.05" onchange="onFieldF(this,\'pLarg\','+exp.id+')" class="p-inp"></div>'
        +'<div><label class="lbl">Comp. parcela (m)</label><input type="number" value="'+exp.pComp+'" min="0.5" step="0.5" onchange="onFieldF(this,\'pComp\','+exp.id+')" class="p-inp"></div>'
      +'</div>'
      +'<div class="p-grid2">'
        +'<div><label class="lbl">Esp. entre parcelas (m)</label><input type="number" value="'+exp.espTrat+'" min="0" step="0.1" onchange="onFieldF(this,\'espTrat\','+exp.id+')" class="p-inp"></div>'
        +'<div><label class="lbl">Esp. entre blocos (m)</label><input type="number" value="'+exp.espBlocos+'" min="0" step="0.1" onchange="onFieldF(this,\'espBlocos\','+exp.id+')" class="p-inp"></div>'
      +'</div>'
      // Rotação
      +'<label class="lbl">Rotação (graus)</label>'
      +'<div style="display:flex;gap:8px;align-items:center;margin-bottom:6px">'
        +'<input type="range" min="-180" max="180" step="1" value="'+exp.angle+'" style="flex:1;accent-color:'+exp.color+'" '
          +'oninput="onAngleSlide(this,'+exp.id+')">'
        +'<input type="number" min="-180" max="180" step="1" value="'+exp.angle+'" style="width:60px" class="p-inp" id="angle-num-'+exp.id+'" '
          +'onchange="onAngleNum(this,'+exp.id+')">'
      +'</div>'
      // Dimensões calculadas
      +'<div class="p-info">'
        +'<b>'+blockW+'</b> × <b>'+totalH+'</b> m &nbsp;|&nbsp; '
        +'<span style="color:var(--grn)"><b>'+(exp.nTrat*nB)+'</b> parcelas</span> &nbsp;|&nbsp; '
        +'<span style="color:var(--yel)">≈'+area+' ha</span>'
      +'</div>'
    +'</div>'
    // Nomes dos tratamentos
    +'<div class="p-section">'
      +'<div class="p-title">Nomes dos Tratamentos</div>'
      +'<div class="trat-grid">'+tratHtml+'</div>'
    +'</div>';
}

/* ── INPUT HANDLERS ──────────────────────────────────────── */
function onExpName(el,id){var exp=getExp(id);if(!exp)return;exp.name=el.value||('Exp '+id);drawExp(exp);renderList();}
function onTratName(el){var exp=getExp(parseInt(el.dataset.ei));if(!exp)return;exp.tratNames[parseInt(el.dataset.ti)]=el.value;drawExp(exp);}
function onField(el,key,id){var exp=getExp(id);if(!exp)return;exp[key]=el.value;randomizeExp(exp);drawExp(exp);renderPanel();renderList();}
function onFieldN(el,key,id){var exp=getExp(id);if(!exp)return;exp[key]=parseInt(el.value)||1;randomizeExp(exp);drawExp(exp);renderPanel();renderList();}
function onFieldF(el,key,id){var exp=getExp(id);if(!exp)return;exp[key]=parseFloat(el.value)||0;drawExp(exp);renderPanel();renderList();}
function onAngleSlide(el,id){
  var exp=getExp(id);if(!exp)return;
  exp.angle=parseFloat(el.value);
  var num=document.getElementById('angle-num-'+id);if(num)num.value=exp.angle;
  drawExp(exp);
}
function onAngleNum(el,id){
  var exp=getExp(id);if(!exp)return;
  exp.angle=parseFloat(el.value)||0;
  drawExp(exp);renderPanel();
}
function toggleVis(id){var exp=getExp(id);if(!exp)return;exp.visible=!exp.visible;drawExp(exp);renderList();}

/* ── LOAD AREA (Etapa 1) ─────────────────────────────────── */
function doLoadArea(){
  var inp=document.createElement('input');inp.type='file';inp.accept='.geojson,.json';
  inp.onchange=function(e){
    var file=e.target.files[0];if(!file)return;
    var reader=new FileReader();
    reader.onload=function(ev){
      try{
        var gj=JSON.parse(ev.target.result);
        _areaLayers.forEach(function(l){_map.removeLayer(l);});
        _areaLayers=[];
        var areaCoords=[],terracLines=[];
        gj.features.forEach(function(ft){
          var type=(ft.properties&&ft.properties.type)||'area';
          var name=(ft.properties&&ft.properties.name)||'';
          var g=ft.geometry;
          if(type==='area'&&g.type==='Polygon'){
            var lyr=L.polygon(g.coordinates[0].map(function(c){return[c[1],c[0]];}),
              {color:'#3fb950',weight:2.5,dashArray:'8,4',fill:true,fillColor:'#3fb950',fillOpacity:0.07}).addTo(_map);
            lyr.bindTooltip('<b style="color:#3fb950">'+name+'</b>',{permanent:true,direction:'center'});
            _areaLayers.push(lyr);
            areaCoords.push(g.coordinates[0]);
          } else if(type==='terraco'&&g.type==='LineString'){
            var lyr2=L.polyline(g.coordinates.map(function(c){return[c[1],c[0]];}),
              {color:'#e3b341',weight:3,dashArray:'12,5'}).addTo(_map);
            lyr2.bindTooltip('<b style="color:#e3b341">'+name+'</b>',{permanent:true,direction:'center'});
            _areaLayers.push(lyr2);
            terracLines.push(g.coordinates);
          }
        });
        // Fit map
        if(areaCoords.length){
          var pts=areaCoords[0].map(function(c){return[c[1],c[0]];});
          _map.fitBounds(L.latLngBounds(pts),{padding:[40,40]});
          // Store SW for new experiments
          var sw=areaCoords[0].reduce(function(b,c){return(c[1]-c[0]*0.001)<(b[1]-b[0]*0.001)?c:b;},areaCoords[0][0]);
          window._areaSW={lat:sw[1],lng:sw[0]};
        }
        // Auto-rotation from terrace
        if(terracLines.length){
          var tc=terracLines[0];
          var p1=tc[0],p2=tc[tc.length-1];
          var ang=Math.atan2(p2[1]-p1[1],p2[0]-p1[0])*180/Math.PI+90;
          while(ang>180)ang-=360;while(ang<-180)ang+=360;
          window._autoAngle=parseFloat(ang.toFixed(1));
        }
        showToast('✓ Área carregada!','');
        setSt(areaCoords.length+' área(s) · '+terracLines.length+' terraço(s) carregados',true);
      }catch(ex){showToast('Erro ao carregar GeoJSON','tr');console.error(ex);}
    };
    reader.readAsText(file);
  };
  inp.click();
}

/* ── EXPORT ──────────────────────────────────────────────── */
function doExportKML(){
  var all=[];
  _experiments.forEach(function(exp){if(exp._gj)all=all.concat(exp._gj);});
  if(!all.length){showToast('Nenhum experimento para exportar','ty');return;}
  var kml='<?xml version="1.0" encoding="UTF-8"?>\n<kml xmlns="http://www.opengis.net/kml/2.2"><Document>\n<n>AgroLayout – Multi-Experimento</n>\n';
  _experiments.forEach(function(exp,ei){
    kml+='<Folder><n>'+xe(exp.name)+'</n>\n';
    for(var i=0;i<exp.nTrat;i++){
      kml+='<Style id="e'+exp.id+'t'+i+'"><LineStyle><color>ff000000</color><width>1</width></LineStyle>'
          +'<PolyStyle><color>99'+PAL[i%PAL.length].slice(5,7)+PAL[i%PAL.length].slice(3,5)+PAL[i%PAL.length].slice(1,3)+'</color></PolyStyle></Style>\n';
    }
    if(exp._gj)exp._gj.forEach(function(f){
      var p=f.properties,coords=f.geometry.coordinates[0].map(function(c){return c[0]+','+c[1]+',0';}).join('\n');
      kml+='<Placemark><n>'+xe(p.trat_nome)+' – B'+p.bloco+'</n>'
          +'<styleUrl>#e'+exp.id+'t'+(p.trat_idx-1)+'</styleUrl>'
          +'<Polygon><outerBoundaryIs><LinearRing><coordinates>'+coords+'</coordinates></LinearRing></outerBoundaryIs></Polygon>'
          +'</Placemark>\n';
    });
    kml+='</Folder>\n';
  });
  kml+='</Document></kml>';
  dl('experimentos.kml',kml,'application/vnd.google-earth.kml+xml');
  showToast('✓ KML exportado!','ty');
}

function doExportCSV(){
  var rows=['exp,exp_nome,bloco,trat_num,trat_nome,lat_sw,lng_sw'];
  _experiments.forEach(function(exp){
    if(exp._gj)exp._gj.forEach(function(f){
      var p=f.properties,c=f.geometry.coordinates[0][0];
      rows.push([p.exp,'"'+p.exp_nome+'"',p.bloco,p.trat_idx,'"'+p.trat_nome+'"',c[1].toFixed(7),c[0].toFixed(7)].join(','));
    });
  });
  dl('parcelas_gps.csv',rows.join('\n'),'text/csv');
  showToast('✓ CSV exportado!','');
}

function doPrint(){window.print();}

/* ── HELPERS ─────────────────────────────────────────────── */
function xe(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function dl(n,c,m){var a=document.createElement('a');a.href='data:'+m+';charset=utf-8,'+encodeURIComponent(c);a.download=n;a.click();}
function setSt(msg,on){document.getElementById('s-msg').textContent=msg;document.getElementById('s-dot').className=on?'on':'';}
function showToast(msg,cls){var t=document.getElementById('toast');t.textContent=msg;t.className='on'+(cls?' '+cls:'');clearTimeout(t._t);t._t=setTimeout(function(){t.className='';},3000);}

window.addEventListener('load',init);

</script>
<script>

/* ═══════════════════════════════════════════════════════════
   ADDITIONS: Overlap detection, Save/Load project, Print croqui
   ═══════════════════════════════════════════════════════════ */

/* ── OVERLAP DETECTION ───────────────────────────────────── */
function getBBoxPoly(exp) {
  // Returns array of [x,y] corners in meters relative to a fixed origin
  // We use the anchor point as reference and work in metric space
  var nB  = exp.delin === 'NONE' ? 1 : exp.nBlocos;
  var pw  = exp.pLarg, ph = exp.pComp, et = exp.espTrat, eb = exp.espBlocos;
  var W   = exp.nTrat * pw + (exp.nTrat - 1) * et;
  var H   = nB * ph + (nB - 1) * eb;
  var deg = exp.angle * Math.PI / 180;
  // 4 corners in local space (meters from anchor)
  var local = [[0,0],[W,0],[W,H],[0,H]];
  // Rotate and translate to world meters
  var lat0 = exp.lat, lng0 = exp.lng;
  return local.map(function(p) {
    var dxM = p[0], dyM = p[1];
    var rxM =  dxM * Math.cos(deg) + dyM * Math.sin(deg);
    var ryM = -dxM * Math.sin(deg) + dyM * Math.cos(deg);
    return [
      (lng0 + rxM / mPerLng(lat0)) * mPerLng(lat0), // x in ~meters
      (lat0 + ryM / MLAT) * MLAT                     // y in ~meters
    ];
  });
}

function polygonsOverlap(polyA, polyB) {
  // SAT (Separating Axis Theorem) for convex polygons
  function axes(poly) {
    var ax = [];
    for (var i = 0; i < poly.length; i++) {
      var p1 = poly[i], p2 = poly[(i+1) % poly.length];
      var nx = -(p2[1]-p1[1]), ny = p2[0]-p1[0];
      var len = Math.sqrt(nx*nx+ny*ny);
      ax.push([nx/len, ny/len]);
    }
    return ax;
  }
  function project(poly, ax) {
    var min=Infinity, max=-Infinity;
    poly.forEach(function(p){ var d=p[0]*ax[0]+p[1]*ax[1]; min=Math.min(min,d); max=Math.max(max,d); });
    return [min, max];
  }
  var allAxes = axes(polyA).concat(axes(polyB));
  for (var i = 0; i < allAxes.length; i++) {
    var pA = project(polyA, allAxes[i]);
    var pB = project(polyB, allAxes[i]);
    if (pA[1] < pB[0] || pB[1] < pA[0]) return false; // gap found
  }
  return true;
}

function checkOverlaps() {
  var warnings = [];
  for (var i = 0; i < _experiments.length; i++) {
    for (var j = i+1; j < _experiments.length; j++) {
      var a = _experiments[i], b = _experiments[j];
      if (!a.visible || !b.visible) continue;
      var pA = getBBoxPoly(a), pB = getBBoxPoly(b);
      if (polygonsOverlap(pA, pB)) {
        warnings.push(a.name + ' × ' + b.name);
        // Highlight borders red
        a.layers.forEach(function(l){ if(l.setStyle) l.setStyle({color:'#f85149'}); });
        b.layers.forEach(function(l){ if(l.setStyle) l.setStyle({color:'#f85149'}); });
      }
    }
  }
  var el = document.getElementById('overlap-status');
  if (!warnings.length) {
    el.innerHTML = '<span style="color:var(--grn)">✓ Sem sobreposições</span>';
  } else {
    el.innerHTML = '<span style="color:var(--red)">⚠ Sobreposição:<br>' + warnings.join('<br>') + '</span>';
    showToast('⚠ Sobreposição detectada!', 'tr');
  }
}

/* ── SAVE / LOAD PROJECT ─────────────────────────────────── */
function doSaveProject() {
  var proj = {
    version: 1,
    app: 'AgroLayout',
    date: new Date().toISOString(),
    experiments: _experiments.map(function(exp) {
      return {
        id: exp.id, name: exp.name, color: exp.color,
        lat: exp.lat, lng: exp.lng, angle: exp.angle,
        delin: exp.delin, nTrat: exp.nTrat, nBlocos: exp.nBlocos,
        pLarg: exp.pLarg, pComp: exp.pComp,
        espTrat: exp.espTrat, espBlocos: exp.espBlocos,
        tratNames: exp.tratNames, allocs: exp.allocs, visible: exp.visible
      };
    })
  };
  dl('agrolayout_projeto.json', JSON.stringify(proj, null, 2), 'application/json');
  showToast('✓ Projeto salvo!', '');
}

function doLoadProject() {
  var inp = document.createElement('input'); inp.type='file'; inp.accept='.json';
  inp.onchange = function(e) {
    var file = e.target.files[0]; if (!file) return;
    var reader = new FileReader();
    reader.onload = function(ev) {
      try {
        var proj = JSON.parse(ev.target.result);
        if (!proj.experiments) throw new Error('Formato inválido');
        // Clear existing
        _experiments.forEach(function(exp) {
          exp.layers.forEach(function(l){ _map.removeLayer(l); });
          if (exp.marker) _map.removeLayer(exp.marker);
        });
        _experiments = [];
        // Restore
        proj.experiments.forEach(function(d) {
          var exp = createExp(d.lat, d.lng);
          // Override with saved data
          exp.id=d.id; exp.name=d.name; exp.color=d.color;
          exp.lat=d.lat; exp.lng=d.lng; exp.angle=d.angle;
          exp.delin=d.delin; exp.nTrat=d.nTrat; exp.nBlocos=d.nBlocos;
          exp.pLarg=d.pLarg; exp.pComp=d.pComp;
          exp.espTrat=d.espTrat; exp.espBlocos=d.espBlocos;
          exp.tratNames=d.tratNames; exp.allocs=d.allocs; exp.visible=d.visible;
          _experiments.push(exp);
          addMarker(exp);
          drawExp(exp);
        });
        _nextId = Math.max.apply(null, _experiments.map(function(e){return e.id;})) + 1;
        _activeExp = _experiments.length ? _experiments[0].id : null;
        renderList(); renderPanel();
        showToast('✓ ' + proj.experiments.length + ' experimentos carregados', '');
        setSt('Projeto carregado: ' + proj.date.slice(0,10), true);
      } catch(ex) { showToast('Erro ao carregar projeto', 'tr'); console.error(ex); }
    };
    reader.readAsText(file);
  };
  inp.click();
}

/* ── PRINT CROQUI ────────────────────────────────────────── */
function doPrintCroqui() {
  var exps = _experiments.filter(function(e){ return e.visible && e._gj && e._gj.length; });
  if (!exps.length) { showToast('Nenhum experimento para imprimir','ty'); return; }

  var html = '<!DOCTYPE html><html><head><meta charset="UTF-8">'
    + '<style>'
    + 'body{font-family:Arial,sans-serif;font-size:11px;color:#000;margin:20px}'
    + 'h1{font-size:16px;margin-bottom:4px} h2{font-size:13px;margin:16px 0 6px;border-bottom:2px solid #333;padding-bottom:3px}'
    + 'h3{font-size:11px;margin:10px 0 4px;color:#444}'
    + '.meta{font-size:10px;color:#666;margin-bottom:16px}'
    + 'table{border-collapse:collapse;width:100%;margin-bottom:12px;font-size:10px}'
    + 'th{background:#333;color:#fff;padding:4px 6px;text-align:center;border:1px solid #999}'
    + 'td{padding:3px 6px;border:1px solid #ccc;text-align:center}'
    + '.bloco-row td{font-weight:bold;background:#f5f5f5}'
    + '.legend{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px}'
    + '.leg-item{display:flex;align-items:center;gap:4px;font-size:10px}'
    + '.leg-dot{width:14px;height:14px;border-radius:3px;border:1px solid #999;flex-shrink:0}'
    + '.croqui-wrap{margin-bottom:16px}'
    + '.croqui-table{border-collapse:collapse}'
    + '.croqui-table td{width:52px;height:36px;border:1px solid #333;text-align:center;vertical-align:middle;font-size:9px;font-weight:bold;padding:2px}'
    + '.bloco-label{writing-mode:vertical-lr;transform:rotate(180deg);font-size:10px;font-weight:bold;text-align:center;padding:4px;background:#eee;border:1px solid #999}'
    + '@media print{body{margin:10px}.page-break{page-break-before:always}}'
    + '</style></head><body>';

  html += '<h1>🌾 Croqui de Experimentos — AgroLayout</h1>';
  html += '<div class="meta">Gerado em: ' + new Date().toLocaleString('pt-BR')
        + ' &nbsp;|&nbsp; ' + exps.length + ' experimento(s)</div>';

  exps.forEach(function(exp, ei) {
    if (ei > 0) html += '<div class="page-break"></div>';
    var nB  = exp.delin === 'NONE' ? 1 : exp.nBlocos;
    var blockW = (exp.nTrat * exp.pLarg + (exp.nTrat-1) * exp.espTrat).toFixed(2);
    var totalH = (nB * exp.pComp + (nB-1) * exp.espBlocos).toFixed(1);

    html += '<h2>' + exp.name + '</h2>';
    html += '<div class="meta">'
          + 'Delineamento: <b>' + (exp.delin==='NONE'?'Grade simples':exp.delin) + '</b> &nbsp;|&nbsp; '
          + 'Parcela: <b>' + exp.pLarg + ' × ' + exp.pComp + ' m</b> &nbsp;|&nbsp; '
          + (exp.espTrat>0 ? 'Esp. entre parc.: <b>'+exp.espTrat+' m</b> &nbsp;|&nbsp; ' : '')
          + (exp.delin!=='NONE' ? 'Esp. entre blocos: <b>'+exp.espBlocos+' m</b> &nbsp;|&nbsp; ' : '')
          + 'Área: <b>' + blockW + ' × ' + totalH + ' m</b> &nbsp;|&nbsp; '
          + 'Rotação: <b>' + exp.angle + '°</b></div>';

    // Legend
    html += '<h3>Legenda</h3><div class="legend">';
    for (var i = 0; i < exp.nTrat; i++) {
      html += '<div class="leg-item"><div class="leg-dot" style="background:'+PAL[i%PAL.length]+'"></div>'
            + (exp.tratNames[i]||'T'+(i+1)) + '</div>';
    }
    html += '</div>';

    // Croqui visual (grid)
    html += '<h3>Croqui (ordem aleatorizada)</h3>';
    html += '<table class="croqui-table"><thead><tr><th class="bloco-label">Bloco</th>';
    for (var t = 0; t < exp.nTrat; t++) html += '<th>Parc '+(t+1)+'</th>';
    html += '</tr></thead><tbody>';

    for (var b = 0; b < nB; b++) {
      html += '<tr><td class="bloco-label">'+(exp.delin!=='NONE'?'B'+(b+1):'–')+'</td>';
      for (var t = 0; t < exp.nTrat; t++) {
        var tIdx  = exp.allocs[b][t];
        var color = PAL[tIdx % PAL.length];
        var name  = exp.tratNames[tIdx] || 'T'+(tIdx+1);
        html += '<td style="background:'+color+'88">' + name + '</td>';
      }
      html += '</tr>';
    }
    html += '</tbody></table>';

    // Randomization table
    html += '<h3>Tabela de Aleatorização</h3>';
    html += '<table><thead><tr><th>Bloco</th>';
    for (var pos = 1; pos <= exp.nTrat; pos++) html += '<th>'+pos+'ª parc.</th>';
    html += '</tr></thead><tbody>';
    for (var b = 0; b < nB; b++) {
      html += '<tr><td><b>'+(exp.delin!=='NONE'?'Bloco '+(b+1):'Parcelas')+'</b></td>';
      for (var t = 0; t < exp.nTrat; t++) {
        var tIdx = exp.allocs[b][t];
        html += '<td>'+(exp.tratNames[tIdx]||'T'+(tIdx+1))+'</td>';
      }
      html += '</tr>';
    }
    html += '</tbody></table>';

    // GPS coords table
    html += '<h3>Coordenadas GPS (canto SW de cada parcela)</h3>';
    html += '<table><thead><tr><th>Bloco</th><th>Tratamento</th><th>Latitude</th><th>Longitude</th></tr></thead><tbody>';
    if (exp._gj) exp._gj.forEach(function(f) {
      var p = f.properties, c = f.geometry.coordinates[0][0];
      html += '<tr><td>'+(exp.delin!=='NONE'?'B'+p.bloco:'–')+'</td><td>'+p.trat_nome+'</td>'
            + '<td>'+c[1].toFixed(6)+'</td><td>'+c[0].toFixed(6)+'</td></tr>';
    });
    html += '</tbody></table>';
  });

  html += '</body></html>';

  var win = window.open('', '_blank');
  win.document.write(html);
  win.document.close();
  win.focus();
  setTimeout(function(){ win.print(); }, 600);
}


</script>
